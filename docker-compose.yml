services:
  annotation-api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install -e . &&
      PYTHONPATH=apps/candidate-mining/src:apps/annotation-tool/backend/src:. uvicorn annotation_api.app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  annotation-tool:
    image: node:22-alpine
    working_dir: /app/apps/annotation-tool/frontend
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_API_BASE=http://127.0.0.1:8000
    ports:
      - "5173:5173"
